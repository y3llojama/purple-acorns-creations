<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact – Purple Acorns Creations</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="logo"><a href="/"><img src="/images/logo.png" alt="Purple Acorns Creations"></a></div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/story.html">Our Story</a>
      <a href="/vision.html">Vision</a>
      <a href="/gallery.html">Gallery</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <section class="section container contact">
    <h2>Contact Us</h2>
    <form id="contactForm" class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn-primary">Send Message</button>
      <p id="status" class="status-msg"></p>
    </form>
  </section>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Purple Acorns Creations – All rights reserved.</p>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
