<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Warm artisan background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7efe3"/>
      <stop offset="45%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#eeddc9"/>
    </linearGradient>

    <!-- Gold gradient for decorative lines -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0"/>
      <stop offset="25%" stop-color="#d4a853" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e8c56a"/>
      <stop offset="75%" stop-color="#d4a853" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4a853" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold gradient for border corners -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#c49240"/>
    </linearGradient>

    <!-- Soft drop shadow for the main title -->
    <filter id="titleShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#2d1b4e" flood-opacity="0.10"/>
    </filter>

    <!-- Subtle glow for gold accents -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Paper grain texture pattern -->
    <pattern id="grain" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </pattern>

    <!-- Reusable acorn shape -->
    <symbol id="acorn" viewBox="-22 -44 44 58">
      <!-- stem -->
      <path d="M 0,-40 Q 7,-46 11,-41" stroke="#8a6e50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- cap (cupule) -->
      <path d="M -19,0 Q -21,-22 0,-24 Q 21,-22 19,0 Z" fill="#c9956b"/>
      <!-- cap texture hatching -->
      <path d="M -14,-14 Q 0,-16 14,-14" stroke="#b5825a" stroke-width="0.9" fill="none"/>
      <path d="M -17,-8 Q 0,-10 17,-8" stroke="#b5825a" stroke-width="0.9" fill="none"/>
      <path d="M -19,-2 Q 0,-4 19,-2" stroke="#b5825a" stroke-width="0.7" fill="none"/>
      <!-- nut body -->
      <ellipse cx="0" cy="17" rx="15" ry="19" fill="#d4a853"/>
      <!-- nut highlight -->
      <ellipse cx="-4" cy="11" rx="5" ry="7" fill="#e8c87a" opacity="0.45"/>
      <!-- nut shadow -->
      <ellipse cx="4" cy="22" rx="6" ry="5" fill="#b8902e" opacity="0.25"/>
    </symbol>

    <!-- Reusable leaf shape -->
    <symbol id="leaf" viewBox="-12 -38 24 40">
      <path d="M 0,0 Q 14,-18 8,-36 Q 0,-20 -8,-36 Q -14,-18 0,0 Z" fill="#9fb89f"/>
      <line x1="0" y1="0" x2="0" y2="-34" stroke="#7a9a7a" stroke-width="0.9"/>
      <!-- leaf veins -->
      <line x1="0" y1="-10" x2="7" y2="-22" stroke="#7a9a7a" stroke-width="0.5" opacity="0.6"/>
      <line x1="0" y1="-10" x2="-7" y2="-22" stroke="#7a9a7a" stroke-width="0.5" opacity="0.6"/>
      <line x1="0" y1="-20" x2="5" y2="-30" stroke="#7a9a7a" stroke-width="0.4" opacity="0.5"/>
      <line x1="0" y1="-20" x2="-5" y2="-30" stroke="#7a9a7a" stroke-width="0.4" opacity="0.5"/>
    </symbol>

    <!-- Small berry/dot cluster -->
    <symbol id="berries" viewBox="-14 -14 28 14">
      <circle cx="-8" cy="-8" r="4.5" fill="#c9956b"/>
      <circle cx="2" cy="-10" r="3.5" fill="#d4a853"/>
      <circle cx="10" cy="-5" r="4" fill="#c9956b" opacity="0.8"/>
      <circle cx="-2" cy="-3" r="3" fill="#d4a853" opacity="0.7"/>
    </symbol>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BACKGROUND                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle warm vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#c9956b" stop-opacity="0.08"/>
  </radialGradient>
  <rect width="1200" height="800" fill="url(#vignette)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- DECORATIVE BORDER FRAME                     -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Outer gold border -->
  <rect x="22" y="22" width="1156" height="756" fill="none" stroke="url(#goldBorder)" stroke-width="1.5" rx="3"/>
  <!-- Inner thin border -->
  <rect x="30" y="30" width="1140" height="740" fill="none" stroke="#e8d9c5" stroke-width="0.8" rx="2"/>

  <!-- Corner flourish — decorative diamond shapes at border intersections -->
  <!-- TL -->
  <polygon points="22,30 30,22 38,30 30,38" fill="#d4a853" opacity="0.8"/>
  <!-- TR -->
  <polygon points="1162,30 1170,22 1178,30 1170,38" fill="#d4a853" opacity="0.8"/>
  <!-- BL -->
  <polygon points="22,762 30,770 38,762 30,754" fill="#d4a853" opacity="0.8"/>
  <!-- BR -->
  <polygon points="1162,762 1170,770 1178,762 1170,754" fill="#d4a853" opacity="0.8"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CORNER BOTANICAL ORNAMENTS                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- TOP-LEFT cluster -->
  <g transform="translate(75, 80)">
    <!-- Main acorn -->
    <use href="#acorn" x="0" y="0" width="44" height="58" transform="translate(0,0) rotate(-5)"/>
    <!-- Leaf cluster -->
    <use href="#leaf" x="0" y="0" width="24" height="40" transform="translate(28,-20) rotate(-25)" opacity="0.85"/>
    <use href="#leaf" x="0" y="0" width="20" height="34" transform="translate(-22,-14) rotate(18)" opacity="0.65"/>
    <use href="#leaf" x="0" y="0" width="18" height="30" transform="translate(15,-32) rotate(-8)" opacity="0.5"/>
    <!-- Berries -->
    <use href="#berries" x="0" y="0" width="28" height="14" transform="translate(35,-4)" opacity="0.85"/>
    <!-- Small accent dots -->
    <circle cx="-10" cy="-38" r="2.5" fill="#d4a853" opacity="0.6"/>
    <circle cx="45" cy="-28" r="2" fill="#c9956b" opacity="0.5"/>
  </g>

  <!-- TOP-RIGHT cluster (mirrored) -->
  <g transform="translate(1125, 80) scale(-1,1)">
    <use href="#acorn" x="0" y="0" width="44" height="58" transform="translate(0,0) rotate(-5)"/>
    <use href="#leaf" x="0" y="0" width="24" height="40" transform="translate(28,-20) rotate(-25)" opacity="0.85"/>
    <use href="#leaf" x="0" y="0" width="20" height="34" transform="translate(-22,-14) rotate(18)" opacity="0.65"/>
    <use href="#leaf" x="0" y="0" width="18" height="30" transform="translate(15,-32) rotate(-8)" opacity="0.5"/>
    <use href="#berries" x="0" y="0" width="28" height="14" transform="translate(35,-4)" opacity="0.85"/>
    <circle cx="-10" cy="-38" r="2.5" fill="#d4a853" opacity="0.6"/>
    <circle cx="45" cy="-28" r="2" fill="#c9956b" opacity="0.5"/>
  </g>

  <!-- BOTTOM-LEFT cluster (flipped vertically) -->
  <g transform="translate(75, 720) scale(1,-1)">
    <use href="#acorn" x="0" y="0" width="38" height="50" transform="translate(0,0) rotate(3) scale(0.85)"/>
    <use href="#leaf" x="0" y="0" width="22" height="36" transform="translate(24,-18) rotate(-20) scale(0.85)" opacity="0.75"/>
    <use href="#leaf" x="0" y="0" width="18" height="30" transform="translate(-18,-12) rotate(15) scale(0.85)" opacity="0.55"/>
    <use href="#berries" x="0" y="0" width="26" height="14" transform="translate(30,-2) scale(0.85)" opacity="0.7"/>
    <circle cx="46" cy="-26" r="2" fill="#c9956b" opacity="0.45"/>
  </g>

  <!-- BOTTOM-RIGHT cluster (flipped both) -->
  <g transform="translate(1125, 720) scale(-1,-1)">
    <use href="#acorn" x="0" y="0" width="38" height="50" transform="translate(0,0) rotate(3) scale(0.85)"/>
    <use href="#leaf" x="0" y="0" width="22" height="36" transform="translate(24,-18) rotate(-20) scale(0.85)" opacity="0.75"/>
    <use href="#leaf" x="0" y="0" width="18" height="30" transform="translate(-18,-12) rotate(15) scale(0.85)" opacity="0.55"/>
    <use href="#berries" x="0" y="0" width="26" height="14" transform="translate(30,-2) scale(0.85)" opacity="0.7"/>
    <circle cx="46" cy="-26" r="2" fill="#c9956b" opacity="0.45"/>
  </g>

  <!-- Side botanical accents (mid-left and mid-right) -->
  <g transform="translate(55, 390)" opacity="0.35">
    <use href="#leaf" x="0" y="0" width="22" height="36" transform="rotate(-90) translate(0,0)"/>
    <circle cx="22" cy="-8" r="3.5" fill="#d4a853"/>
    <circle cx="30" cy="2" r="2.5" fill="#c9956b"/>
  </g>
  <g transform="translate(1145, 390)" opacity="0.35">
    <use href="#leaf" x="0" y="0" width="22" height="36" transform="rotate(90) translate(0,0)"/>
    <circle cx="-22" cy="-8" r="3.5" fill="#d4a853"/>
    <circle cx="-30" cy="2" r="2.5" fill="#c9956b"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MAIN CONTENT AREA                           -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Brand name -->
  <text
    x="600" y="200"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="19"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.22em"
    fill="#6b5b7b"
  >PURPLE ACORNZ CREATIONS</text>

  <!-- Top ornamental divider -->
  <!-- Left line -->
  <line x1="220" y1="222" x2="490" y2="222" stroke="url(#goldLine)" stroke-width="1"/>
  <!-- Center ornament: three dots + tiny acorn cap -->
  <circle cx="515" cy="222" r="2.2" fill="#d4a853" opacity="0.7"/>
  <g transform="translate(600, 222)">
    <!-- Tiny acorn cap as center ornament -->
    <path d="M -10,0 Q -11,-11 0,-12 Q 11,-11 10,0 Z" fill="#c9956b"/>
    <ellipse cx="0" cy="7" rx="8" ry="10" fill="#d4a853"/>
    <ellipse cx="-2" cy="4" rx="3" ry="4" fill="#e8c57a" opacity="0.5"/>
  </g>
  <circle cx="685" cy="222" r="2.2" fill="#d4a853" opacity="0.7"/>
  <!-- Right line -->
  <line x1="710" y1="222" x2="980" y2="222" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Shop label tag -->
  <text
    x="600" y="275"
    text-anchor="middle"
    font-family="'DM Sans', 'Gill Sans', Optima, Candara, sans-serif"
    font-size="12"
    font-weight="500"
    letter-spacing="0.28em"
    fill="#c9956b"
  >✦  THE SHOP  ✦</text>

  <!-- Warm horizontal rule below tag -->
  <rect x="540" y="288" width="120" height="1" fill="#e8d9c5" rx="0.5"/>

  <!-- ─── MAIN HEADLINE ─── -->
  <text
    x="600" y="425"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="114"
    font-weight="500"
    letter-spacing="-0.01em"
    fill="#2d1b4e"
    filter="url(#titleShadow)"
  >Coming Soon</text>

  <!-- Italic serif subtitle -->
  <text
    x="600" y="488"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="26"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.04em"
    fill="#6b5b7b"
  >Something beautiful is on its way</text>

  <!-- Bottom decorative divider with gold dots -->
  <line x1="310" y1="526" x2="520" y2="526" stroke="url(#goldLine)" stroke-width="1"/>
  <circle cx="540" cy="526" r="2.5" fill="#d4a853" opacity="0.7"/>
  <circle cx="555" cy="526" r="3.5" fill="#d4a853"/>
  <circle cx="570" cy="526" r="2.5" fill="#d4a853" opacity="0.7"/>
  <!-- Small leaf accent at center -->
  <g transform="translate(600, 526)">
    <path d="M -5,6 Q -8,-6 0,-10 Q 8,-6 5,6 Z" fill="#9fb89f" opacity="0.8"/>
    <line x1="0" y1="6" x2="0" y2="-9" stroke="#7a9a7a" stroke-width="0.8"/>
  </g>
  <circle cx="630" cy="526" r="2.5" fill="#d4a853" opacity="0.7"/>
  <circle cx="645" cy="526" r="3.5" fill="#d4a853"/>
  <circle cx="660" cy="526" r="2.5" fill="#d4a853" opacity="0.7"/>
  <line x1="680" y1="526" x2="890" y2="526" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="600" y="588"
    text-anchor="middle"
    font-family="'DM Sans', 'Gill Sans', Optima, Candara, sans-serif"
    font-size="15"
    font-weight="300"
    letter-spacing="0.12em"
    fill="#6b5b7b"
  >Handcrafted goods  ·  Made with love  ·  Coming your way</text>

  <!-- ─── SCATTERED MID-FIELD ACCENTS ─── -->
  <!-- Tiny leaves floating in left field -->
  <g transform="translate(165, 370) rotate(-12)" opacity="0.28">
    <use href="#leaf" x="-11" y="-38" width="22" height="40"/>
  </g>
  <g transform="translate(142, 410) rotate(22)" opacity="0.2">
    <use href="#leaf" x="-11" y="-38" width="18" height="32"/>
  </g>
  <circle cx="185" cy="345" r="4" fill="#d4a853" opacity="0.3"/>
  <circle cx="152" cy="385" r="2.8" fill="#c9956b" opacity="0.28"/>

  <!-- Tiny leaves floating in right field -->
  <g transform="translate(1035, 370) rotate(12)" opacity="0.28">
    <use href="#leaf" x="-11" y="-38" width="22" height="40"/>
  </g>
  <g transform="translate(1058, 410) rotate(-22)" opacity="0.2">
    <use href="#leaf" x="-11" y="-38" width="18" height="32"/>
  </g>
  <circle cx="1015" cy="345" r="4" fill="#d4a853" opacity="0.3"/>
  <circle cx="1048" cy="385" r="2.8" fill="#c9956b" opacity="0.28"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FOOTER COPYRIGHT                            -->
  <!-- ═══════════════════════════════════════════ -->
  <text
    x="600" y="748"
    text-anchor="middle"
    font-family="'DM Sans', 'Gill Sans', Optima, Candara, sans-serif"
    font-size="10.5"
    letter-spacing="0.18em"
    fill="#c9b5a0"
  >© PURPLE ACORNZ CREATIONS</text>

</svg>
