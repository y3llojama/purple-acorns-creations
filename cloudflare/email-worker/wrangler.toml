name = "purple-acorns-email-forwarder"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# Set these as Wrangler secrets or override in Cloudflare dashboard — do not commit real addresses.
# Run: npx wrangler secret put DEST_GMAIL
#      npx wrangler secret put DEST_RESEND
DEST_GMAIL = "your-gmail@gmail.com"
DEST_RESEND = "hello@<your-resend-domain>.resend.app"
